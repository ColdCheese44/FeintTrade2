name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pytest is the test runner but isn't a runtime dep, so install it explicitly.
          pip install pytest
          pip install -r requirements.txt

      - name: Compile (syntax gate)
        run: |
          python -m compileall app.py bot.py dashboard.py scripts tests

      - name: Test
        env:
          # Keep tests hermetic/offline — no real broker or AI credentials in CI.
          APCA_BASE_URL: "https://paper-api.alpaca.markets"
        run: |
          python -m pytest -q
